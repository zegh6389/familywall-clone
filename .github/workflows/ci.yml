# FamilyWall Clone — CI
# Triggers: push to any branch, pull_request, manual workflow_dispatch
# Builds: flutter analyze + test + Android APK + iOS (mac only) + web build
# Also: refreshes Graphify knowledge graph and uploads artifacts

name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "codex/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.27.1"
  JAVA_VERSION: "17"

jobs:
  analyze-test:
    name: Analyze + Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show toolchain
        run: |
          flutter --version
          dart --version
          flutter doctor -v

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate code (Drift, freezed, json_serializable)
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        working-directory: app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests with coverage
        working-directory: app
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  build-android-debug:
    name: Build Android Debug APK
    needs: analyze-test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Make local.properties (Android SDK)
        working-directory: app/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug)
        working-directory: app
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: familywall-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-android-release-unsigned:
    name: Build Android Release APK (unsigned)
    needs: analyze-test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Make local.properties
        working-directory: app/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release, no signing for CI)
        working-directory: app
        run: flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: familywall-release-apk-unsigned
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-web:
    name: Build Web (release)
    needs: analyze-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web (release)
        working-directory: app
        run: flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: familywall-web-release
          path: app/build/web/
          retention-days: 14

  build-ios:
    name: Build iOS (no signing — release archive)
    if: false  # enable when Apple Developer certs configured as secrets
    needs: analyze-test
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        working-directory: app
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: familywall-ios-app
          path: app/build/ios/iphoneos/Runner.app
          retention-days: 14

  graphify-refresh:
    name: Refresh Graphify knowledge graph
    needs: analyze-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Graphify
        run: pip install graphify

      - name: Run graphify update
        run: graphify update .

      - name: Upload graph
        uses: actions/upload-artifact@v4
        with:
          name: graphify-snapshot
          path: graphify-out/
          retention-days: 30

      - name: Deploy graph report to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./graphify-out
          destination_dir: graph

  notify-failure:
    name: Notify on failure
    if: failure()
    runs-on: ubuntu-latest
    needs: [analyze-test, build-android-debug, build-web]
    steps:
      - name: Summary
        run: |
          echo "## ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Author: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
