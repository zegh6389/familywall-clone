name: familywall_clone
description: "1:1 Flutter rebuild of FamilyWall: Family Organizer (Android + iOS)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  add_2_calendar: ^3.0.1
  appsflyer_sdk: ^6.14.5
  badges: ^3.1.0
  cached_network_image: ^3.4.1
  chewie: ^1.8.5
  crypto: ^3.0.5
  cupertino_icons: ^1.0.8
  device_info_plus: ^11.1.0
  dio: ^5.7.0
  drift: ^2.20.3
  firebase_analytics: ^11.3.3
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.3
  fl_chart: ^0.69.0
  flutter:
    sdk: flutter
  # REPLACED flutter_background_geolocation (4.x / 5.x pulls tslocationmanager:3.+ which is no longer on Maven mirror)
  # Background location is implemented manually via geolocator + workmanager + flutter_local_notifications (see lib/services/location.dart).
  flutter_contacts: ^1.1.9+2
  flutter_hooks: ^0.20.5
  flutter_image_compress: ^2.3.0
  flutter_local_notifications: ^17.2.2
  flutter_riverpod: ^2.5.3
  flutter_secure_storage: ^9.2.2
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.10+1
  flutter_staggered_grid_view: ^0.7.0
  freezed_annotation: ^2.4.4
  geolocator: ^13.0.2
  go_router: ^14.6.2
  google_maps_flutter: ^2.9.0
  google_sign_in: ^6.2.1
  home_widget: ^0.6.0
  http: ^1.2.2
  icalendar_parser: ^2.1.0
  image_picker: ^1.1.2
  in_app_purchase: ^3.2.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  jwt_decoder: ^2.0.1
  logging: ^1.2.0
  oauth2: ^2.0.3
  package_info_plus: ^8.0.2
  path: ^1.9.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  photo_view: ^0.15.0
  pretty_dio_logger: ^1.4.0
  purchases_flutter: ^6.29.0
  retry: ^3.1.2
  segment_analytics: ^1.1.11
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  sqlite3_flutter_libs: ^0.5.24
  syncfusion_flutter_calendar: ^27.1.58
  table_calendar: ^3.1.2
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  video_player: ^2.9.1

dev_dependencies:
  build_runner: ^2.4.13
  coverage: ^1.9.0
  drift_dev: ^2.20.3
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  golden_toolkit: ^0.15.0
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  patrol: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - assets/mockups/

flutter_icons:
  image_path: assets/icons/app-icon.png
  android: true
  ios: true
  remove_alpha_around_icon: true
